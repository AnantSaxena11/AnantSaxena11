name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate GitHub metrics
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: AnantSaxena11
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          repositories_affiliations: owner, collaborator, organization_member
          plugin_languages: yes
          plugin_languages_ignored: >-
            html, css, tex, less, dockerfile, makefile, shell
          plugin_languages_limit: 8
          plugin_languages_details: lines, bytes-size, percentage
          plugin_languages_analysis_timeout: 30
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: icons
          plugin_topics_sort: stars
          output_action: commit
          filename: metrics.svg
          committer_branch: main
          committer_message: "chore: update metrics [skip ci]"

      - name: Generate half-year isometric calendar
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: AnantSaxena11
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          config_timezone: Asia/Kolkata
          output_action: commit
          filename: metrics-isocalendar.svg
          committer_branch: main
          committer_message: "chore: update isocalendar metrics [skip ci]"

      - name: Generate notable contributions
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: AnantSaxena11
          base: ""
          plugin_notable: yes
          plugin_notable_repositories: yes
          output_action: commit
          filename: metrics-notable.svg
          committer_branch: main
          committer_message: "chore: update notable metrics [skip ci]"

      - name: Generate pinned repositories
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: AnantSaxena11
          base: ""
          plugin_repositories: yes
          plugin_repositories_featured: ""
          plugin_repositories_pinned: 6
          plugin_repositories_starred: 0
          plugin_repositories_order: featured, pinned, starred, random
          output_action: commit
          filename: metrics-repositories.svg
          committer_branch: main
          committer_message: "chore: update repositories metrics [skip ci]"

      - name: Generate followers and following
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: AnantSaxena11
          base: ""
          plugin_people: yes
          plugin_people_types: followers, following
          plugin_people_limit: 28
          plugin_people_size: 28
          plugin_people_identicons: no
          output_action: commit
          filename: metrics-people.svg
          committer_branch: main
          committer_message: "chore: update people metrics [skip ci]"

      - name: Generate stargazers stats
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: AnantSaxena11
          base: ""
          plugin_stargazers: yes
          plugin_stargazers_days: 14
          plugin_stargazers_charts: yes
          plugin_stargazers_charts_type: classic
          output_action: commit
          filename: metrics-stargazers.svg
          committer_branch: main
          committer_message: "chore: update stargazers metrics [skip ci]"

      - name: Generate recent activity
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: AnantSaxena11
          base: ""
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: all
          config_timezone: Asia/Kolkata
          output_action: commit
          filename: metrics-activity.svg
          committer_branch: main
          committer_message: "chore: update activity metrics [skip ci]"

      - name: Generate issues and PRs followup
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: AnantSaxena11
          base: ""
          plugin_followup: yes
          plugin_followup_sections: user
          plugin_followup_indepth: yes
          output_action: commit
          filename: metrics-followup.svg
          committer_branch: main
          committer_message: "chore: update followup metrics [skip ci]"

      - name: Generate GitHub topics
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: AnantSaxena11
          base: ""
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: icons
          plugin_topics_sort: random
          output_action: commit
          filename: metrics-topics.svg
          committer_branch: main
          committer_message: "chore: update topics metrics [skip ci]"
